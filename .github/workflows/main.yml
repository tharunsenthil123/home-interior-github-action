name: Deploy Interior Dashboard Website

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: ⚙️ Setup GitHub Pages
        uses: actions/configure-pages@v4

      - name: 📦 Upload Project Files (Artifact)
        uses: actions/upload-pages-artifact@v3
        with:
          path: .   # includes HTML, CSS, JS, images, dashboard, login

      - name: 🚀 Deploy Website
        uses: actions/deploy-pages@v4