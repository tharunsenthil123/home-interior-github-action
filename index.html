<!DOCTYPE html>
<html>
<head>
  <title>Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="navbar">
  <h1>Dashboard</h1>
  <button onclick="logout()">Logout</button>
</header>

<section class="dashboard">

  <h2 id="welcome"></h2>

  <!-- CUSTOMER VIEW -->
  <div id="customerPanel" class="panel">
    <h3>Your Designs</h3>

    <div class="grid">
      <div class="card">
        <img src="images/livingroom.jpg">
        <p>Living Room</p>
      </div>

      <div class="card">
        <img src="images/bedroom.jpg">
        <p>Bedroom</p>
      </div>
    </div>
  </div>

  <!-- STAFF VIEW -->
  <div id="staffPanel" class="panel">
    <h3>Staff Control Panel</h3>
    <button onclick="addDesign()">➕ Add New Design</button>
    <button onclick="alert('View bookings')">📋 View Bookings</button>
  </div>

</section>

<script src="script.js"></script>
</body>
</html>
