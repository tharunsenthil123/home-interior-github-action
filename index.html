<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dream Interiors</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- NAVBAR -->
<header class="navbar">
    <h1>Dream Interiors</h1>
    <nav>
        <a href="#">Home</a>
        <a href="#designs">Designs</a>
        <a href="#contact">Contact</a>
    </nav>
</header>

<!-- HERO -->
<section class="hero">
    <div class="overlay">
        <h2>Make Your Home Beautiful</h2>
        <p>Luxury Interior Designs for Modern Living</p>
        <button onclick="scrollToDesigns()">Explore Now</button>
    </div>
</section>

<!-- DESIGNS -->
<section id="designs" class="designs">
    <h2>Our Designs</h2>

    <div class="grid">

        <div class="card">
            <img src="https://source.unsplash.com/400x300/?luxury-living-room">
            <div class="card-content">
                <h3>Living Room</h3>
                <p>Modern elegant space</p>
            </div>
        </div>

        <div class="card">
            <img src="https://source.unsplash.com/400x300/?modern-bedroom">
            <div class="card-content">
                <h3>Bedroom</h3>
                <p>Comfort & luxury</p>
            </div>
        </div>

        <div class="card">
            <img src="https://source.unsplash.com/400x300/?modular-kitchen">
            <div class="card-content">
                <h3>Kitchen</h3>
                <p>Smart modular design</p>
            </div>
        </div>

    </div>
</section>

<!-- CONTACT -->
<section id="contact" class="contact">
    <h2>Contact Us</h2>
    <input type="text" placeholder="Your Name">
    <input type="email" placeholder="Your Email">
    <button onclick="submitForm()">Send Message</button>
</section>

<script src="script.js"></script>
</body>
</html>
